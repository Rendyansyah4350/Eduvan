<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Eduvan</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Login</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <strong>Login</strong>
    <p>Login to continue your learning journey</p>
  </div>

  <form #loginForm="ngForm">
    <ion-card class="form-card">
      <ion-list>

        <!-- Email -->
        <ion-item>
          <ion-input
            name="email"
            type="email"
            label="Email"
            labelPlacement="floating"
            placeholder="example@gmail.com"
            required
            email
            [(ngModel)]="email">
          </ion-input>
        </ion-item>

        <!-- Password -->
        <ion-item>
          <ion-input
            name="password"
            type="password"
            label="Password"
            labelPlacement="floating"
            placeholder="Enter your password"
            required
            [(ngModel)]="password">

            <ion-input-password-toggle slot="end"></ion-input-password-toggle></ion-input>
        </ion-item>

        <!-- Button Login -->
      <ion-button expand="block" class="submit-button" (click)="login()">
        Login
      </ion-button>

      </ion-list>
    </ion-card>

  </form>

  <div class="login-others">
    <ion-button color="medium" routerLink="/register">
      Don't have an account?
    </ion-button>
  </div>

</ion-content>
