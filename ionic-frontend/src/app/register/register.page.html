<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Eduvan</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <strong>Create Account</strong>
    <p>Register to start your learning journey</p>
  </div>

  <!-- Form di dalam Card -->
  <ion-card class="form-card">
    <ion-list>
      <ion-item>
        <ion-input
          label="Full Name"
          label-placement="floating"
          placeholder="Enter your full name"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          label="Email"
          type="email"
          required
          placeholder="Enter your email"
          label-placement="floating"
        >
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          type="password"
          label="Password"
          required
          minlength="6"
          placeholder="Enter your password"
        >
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          type="password"
          label="Confirm Password"
          required
          placeholder="Confirm your password"
        >
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <ion-button expand="block" class="create-button">
        Create Account
      </ion-button>
    </ion-list>
  </ion-card>

  <!-- Login lainnya (opsional sesuai gambar) -->
  <div class="login-others">
    <ion-text color="medium">Login lainnya</ion-text>
  </div>
</ion-content>
