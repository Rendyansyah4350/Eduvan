<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Eduvan</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="container">
    <strong>Create Account</strong>
    <p>Register to start your learning journey</p>
  </div>

  <!-- Form di dalam Card -->
  <ion-card class="form-card">
    <ion-list [formGroup]="registerForm">
      <ion-item>
        <ion-input
          label="Full Name"
          required
          label-placement="floating"
          placeholder="Enter your full name"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          label="Email"
          type="email"
          required
          placeholder="Enter your email"
          label-placement="floating"
        >
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          formControlName="password"
          type="password"
          label="Password"
          required
          minlength="6"
          placeholder="Enter your password"
          label-placement="floating"
        >
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          formControlName="confirmPassword"
          type="confirmPassword"
          required
          label="Confirm Password"
          placeholder="Confirm your password"
          label-placement="floating"
        >
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <!-- ERROR -->
      <ion-text
        color="danger"
        *ngIf="registerForm.errors?.['mismatch'] && f['confirmPassword'].dirty"
      >
        <small>Invalid password</small>
      </ion-text>

      <!-- SUCCESS -->
      <ion-text
        color="success"
        *ngIf="!registerForm.errors?.['mismatch'] && f['confirmPassword'].dirty"
      >
        <small>Password match</small>
      </ion-text>

      <ion-button expand="block" class="submit-button" routerLink="/login">
        Create Account
      </ion-button>
    </ion-list>
  </ion-card>

  <!-- Login lainnya (opsional sesuai gambar) -->
  <div class="login-others">
    <ion-text color="medium">Login lainnya</ion-text>
  </div>
</ion-content>
